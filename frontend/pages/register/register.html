<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../../assets/register.css">
</head>
<body>

    <!-- ของตกแต่งซ้าย -->
    <div class="deco deco-left">
        <svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
            <!-- ชั้นหนังสือ -->
            <rect x="20" y="380" width="260" height="12" rx="4" fill="rgba(255,255,255,0.15)"/>
            <rect x="20" y="260" width="260" height="12" rx="4" fill="rgba(255,255,255,0.15)"/>
            <rect x="20" y="140" width="260" height="12" rx="4" fill="rgba(255,255,255,0.15)"/>

            <!-- หนังสือแถวล่าง -->
            <rect x="30"  y="330" width="28" height="50" rx="3" fill="rgba(255,255,255,0.35)"/>
            <rect x="64"  y="340" width="22" height="40" rx="3" fill="rgba(255,255,255,0.2)"/>
            <rect x="92"  y="325" width="32" height="55" rx="3" fill="rgba(255,255,255,0.3)"/>
            <rect x="130" y="335" width="20" height="45" rx="3" fill="rgba(255,255,255,0.25)"/>
            <rect x="156" y="328" width="26" height="52" rx="3" fill="rgba(255,255,255,0.4)"/>
            <rect x="188" y="342" width="18" height="38" rx="3" fill="rgba(255,255,255,0.2)"/>
            <rect x="212" y="330" width="30" height="50" rx="3" fill="rgba(255,255,255,0.3)"/>

            <!-- หนังสือแถวกลาง -->
            <rect x="30"  y="210" width="24" height="50" rx="3" fill="rgba(255,255,255,0.25)"/>
            <rect x="60"  y="200" width="30" height="60" rx="3" fill="rgba(255,255,255,0.35)"/>
            <rect x="96"  y="215" width="20" height="45" rx="3" fill="rgba(255,255,255,0.2)"/>
            <rect x="122" y="205" width="28" height="55" rx="3" fill="rgba(255,255,255,0.3)"/>
            <rect x="156" y="212" width="22" height="48" rx="3" fill="rgba(255,255,255,0.4)"/>
            <rect x="184" y="200" width="32" height="60" rx="3" fill="rgba(255,255,255,0.2)"/>
            <rect x="222" y="208" width="26" height="52" rx="3" fill="rgba(255,255,255,0.3)"/>

            <!-- หนังสือแถวบน -->
            <rect x="30"  y="90" width="26" height="50" rx="3" fill="rgba(255,255,255,0.3)"/>
            <rect x="62"  y="82" width="32" height="58" rx="3" fill="rgba(255,255,255,0.2)"/>
            <rect x="100" y="92" width="20" height="48" rx="3" fill="rgba(255,255,255,0.38)"/>
            <rect x="126" y="85" width="28" height="55" rx="3" fill="rgba(255,255,255,0.25)"/>
            <rect x="160" y="90" width="24" height="50" rx="3" fill="rgba(255,255,255,0.3)"/>
            <rect x="190" y="80" width="30" height="60" rx="3" fill="rgba(255,255,255,0.2)"/>
            <rect x="226" y="88" width="22" height="52" rx="3" fill="rgba(255,255,255,0.35)"/>

            <!-- ดาว -->
            <circle cx="60"  cy="50" r="2" fill="rgba(255,255,255,0.4)"/>
            <circle cx="150" cy="30" r="3" fill="rgba(255,255,255,0.3)"/>
            <circle cx="240" cy="55" r="2" fill="rgba(255,255,255,0.5)"/>
            <circle cx="100" cy="20" r="1.5" fill="rgba(255,255,255,0.3)"/>
            <circle cx="200" cy="15" r="2" fill="rgba(255,255,255,0.4)"/>
        </svg>
        <p class="deco-text">เริ่มต้นการเดินทาง<br>แห่งการอ่าน</p>
    </div>

    <!-- form กลาง -->
    <form id="registerForm">
        <h2>สมัครสมาชิก</h2>

        <div class="input-group">
            <label>ชื่อผู้ใช้</label>
            <input type="email" id="username" placeholder="example@email.com" required>
        </div>

        <div class="input-group">
            <label>รหัสผ่าน</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="input-group">
            <label>ยืนยันรหัสผ่าน</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" required>
        </div>

        <button type="submit">สมัครสมาชิก</button>

        <div id="message"></div>

        <p class="login-link">
            มีบัญชีอยู่แล้ว?
            <a href="../../login.html">เข้าสู่ระบบ</a>
        </p>
    </form>

    <!-- ของตกแต่งขวา -->
    <div class="deco deco-right">
        <svg viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
            <!-- วงกลมตกแต่ง -->
            <circle cx="150" cy="150" r="100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="40"/>
            <circle cx="150" cy="150" r="60"  fill="none" stroke="rgba(255,255,255,0.1)"  stroke-width="20"/>
            <circle cx="150" cy="150" r="25"  fill="rgba(255,255,255,0.12)"/>

            <!-- ไอคอนหนังสือตรงกลาง -->
            <rect x="120" y="135" width="60" height="45" rx="4" fill="rgba(255,255,255,0.25)"/>
            <line x1="150" y1="135" x2="150" y2="180" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
            <rect x="123" y="138" width="24" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
            <rect x="153" y="138" width="24" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
            <rect x="123" y="146" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>
            <rect x="153" y="146" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>

            <!-- จุดตกแต่ง -->
            <circle cx="50"  cy="320" r="40" fill="rgba(255,255,255,0.04)"/>
            <circle cx="250" cy="380" r="55" fill="rgba(255,255,255,0.04)"/>
            <circle cx="80"  cy="420" r="30" fill="rgba(255,255,255,0.06)"/>

            <!-- เส้นตกแต่ง -->
            <line x1="30"  y1="270" x2="270" y2="270" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
            <line x1="30"  y1="280" x2="180" y2="280" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

            <!-- ดาวเล็กๆ -->
            <circle cx="40"  cy="80"  r="2"   fill="rgba(255,255,255,0.5)"/>
            <circle cx="260" cy="100" r="1.5" fill="rgba(255,255,255,0.4)"/>
            <circle cx="200" cy="50"  r="2.5" fill="rgba(255,255,255,0.3)"/>
            <circle cx="80"  cy="40"  r="1.5" fill="rgba(255,255,255,0.4)"/>
        </svg>
        <p class="deco-text">ห้องสมุดออนไลน์<br>สำหรับทุกคน</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../../js/api.js"></script>
    <script src="../../js/register.js"></script>
</body>
</html>

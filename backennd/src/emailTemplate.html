<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

</head>
<body>
    <div style="font-family: Arial, sans-serif; max-width: 500px; margin: auto; border: 1px solid #ddd; border-radius: 10px; overflow: hidden;">
        <div style="background-color: #4CAF50; padding: 20px; text-align: center;">
            <h2 style="color: white; margin: 0;">📚 Library Booking System</h2>
        </div>
        <div style="padding: 30px;">
            <h3 style="color: #333;">แจ้งเตือนคืนหนังสือ</h3>
            <p style="color: #555;">หนังสือของคุณใกล้ถึงกำหนดคืนแล้ว!</p>
            <div style="background: #f9f9f9; border-left: 4px solid #4CAF50; padding: 15px; margin: 20px 0;">
                <p style="margin: 5px 0;"><strong>📖 ชื่อหนังสือ:</strong> {{book}}</p>
                <p style="margin: 5px 0;"><strong>📅 กำหนดคืน:</strong> {{date}}</p>
            </div>
            <p style="color: #e53935; font-weight: bold;">⚠️ กรุณาคืนหนังสือภายในเวลาที่กำหนด</p>
        </div>
        <div style="background: #f1f1f1; padding: 15px; text-align: center;">
            <p style="color: #aaa; font-size: 12px; margin: 0;">Library Booking System © 2026</p>
        </div>
    </div>
    <script></script>
</body>
</html>
